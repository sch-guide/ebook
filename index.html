<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ebook</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>
body{
  margin:0;
  background:#f0f0f0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
}

#book{
  width:360px;
  height:640px;
}

.page{
  width:100%;
  height:100%;
}

.page img{
  width:100%;
  height:100%;
  object-fit:contain;
  border-radius:10px;
}

@media (max-width: 768px){
  #book{
    width:95vw;
    height:85vh;
  }
}
</style>
</head>

<body>

<div id="book">

<div class="page"><img src="images/1.jpg"></div>
<div class="page"><img src="images/2.jpg"></div>
<div class="page"><img src="images/3.jpg"></div>
<div class="page"><img src="images/4.jpg"></div>
<div class="page"><img src="images/5.jpg"></div>
<div class="page"><img src="images/6.jpg"></div>
<div class="page"><img src="images/7.jpg"></div>
<div class="page"><img src="images/8.jpg"></div>
<div class="page"><img src="images/9.jpg"></div>
<div class="page"><img src="images/10.jpg"></div>
<div class="page"><img src="images/11.jpg"></div>
<div class="page"><img src="images/12.jpg"></div>
<div class="page"><img src="images/13.jpg"></div>
<div class="page"><img src="images/14.jpg"></div>
<div class="page"><img src="images/15.jpg"></div>
<div class="page"><img src="images/16.jpg"></div>
<div class="page"><img src="images/17.jpg"></div>
<div class="page"><img src="images/18.jpg"></div>
<div class="page"><img src="images/19.jpg"></div>
<div class="page"><img src="images/20.jpg"></div>
<div class="page"><img src="images/21.jpg"></div>
<div class="page"><img src="images/22.jpg"></div>
<div class="page"><img src="images/23.jpg"></div>
<div class="page"><img src="images/24.jpg"></div>
<div class="page"><img src="images/25.jpg"></div>
<div class="page"><img src="images/26.jpg"></div>
<div class="page"><img src="images/27.jpg"></div>
<div class="page"><img src="images/28.jpg"></div>
<div class="page"><img src="images/29.jpg"></div>
<div class="page"><img src="images/30.jpg"></div>
<div class="page"><img src="images/31.jpg"></div>
<div class="page"><img src="images/32.jpg"></div>
<div class="page"><img src="images/33.jpg"></div>

</div>

<script>
const pageFlip = new St.PageFlip(
  document.getElementById("book"),
  {
    width:360,
    height:640,
    size:"stretch",
    minWidth:300,
    maxWidth:420,
    minHeight:500,
    maxHeight:750,
    showCover:true,
    usePortrait:true,
    mobileScrollSupport:true
  }
);

pageFlip.loadFromHTML(document.querySelectorAll(".page"));
</script>

<audio id="bgm" loop>
  <source src="BGM.mp3" type="audio/mpeg">
</audio>

<button id="thumbBtn" onclick="toggleThumbs()" style="
position:fixed;
bottom:18px;
left:18px;
z-index:999999999;
width:46px;
height:46px;
border-radius:50%;
border:none;
background:rgba(11,78,162,0.75);
color:white;
font-size:24px;
">
▦
</button>

<button id="bgmBtn" onclick="toggleBgm()" style="
position:fixed;
bottom:18px;
right:18px;
z-index:999999999;
width:46px;
height:46px;
border-radius:50%;
border:none;
background:rgba(11,78,162,0.75);
color:white;
font-size:22px;
">
🔊
</button>

<div id="thumbs" style="
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:999999998;
background:rgba(30,40,60,0.95);
overflow:auto;
padding:70px 20px 30px;
box-sizing:border-box;
">
<div style="
position:fixed;
top:18px;
left:0;
width:100%;
text-align:center;
color:white;
font-size:22px;
font-weight:bold;
">
썸네일
</div>

<button onclick="toggleThumbs()" style="
position:fixed;
top:18px;
left:18px;
z-index:999999999;
border:none;
background:none;
color:white;
font-size:36px;
">
‹
</button>

<div id="thumbGrid" style="
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:18px;
">
</div>
</div>

<script>
const bgm = document.getElementById('bgm');
const bgmBtn = document.getElementById('bgmBtn');

function toggleBgm(){
  if(bgm.paused){
    bgm.play();
    bgmBtn.textContent = '🔊';
    bgmBtn.style.opacity = '1';
  }else{
    bgm.pause();
    bgmBtn.textContent = '🔇';
    bgmBtn.style.opacity = '0.6';
  }
}

function toggleThumbs(){
  const thumbs = document.getElementById('thumbs');
  thumbs.style.display = thumbs.style.display === 'none' ? 'block' : 'none';
}

const thumbGrid = document.getElementById('thumbGrid');

for(let i=1; i<=33; i++){
  const item = document.createElement('div');
  item.style.textAlign = 'center';
  item.style.color = 'white';
  item.style.fontSize = '16px';

  item.innerHTML = `
    <img src="images/${i}.jpg" style="width:100%; border-radius:4px;">
    <div style="margin-top:6px;">${i}</div>
  `;

  item.onclick = function(){
    pageFlip.flip(i - 1);
    toggleThumbs();
  };

  thumbGrid.appendChild(item);
}
</script>
